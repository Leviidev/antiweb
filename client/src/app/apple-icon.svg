<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f3e8ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112" fill="url(#bg-grad)" />

  <!-- Inner dark container -->
  <rect x="48" y="48" width="416" height="416" rx="96" ry="96" fill="#070a12" fill-opacity="0.9" />

  <!-- Antigravity Sparkle / Star Icon -->
  <g filter="url(#glow)">
    <!-- Main central sparkle -->
    <path d="M256 112 C256 200 200 256 112 256 C200 256 256 312 256 400 C256 312 312 256 400 256 C312 256 256 200 256 112 Z" fill="url(#sparkle-grad)" />
    
    <!-- Top right small sparkle -->
    <path d="M368 128 C368 160 340 180 308 180 C340 180 368 200 368 232 C368 200 396 180 428 180 C396 180 368 160 368 128 Z" fill="#ec4899" opacity="0.8" />

    <!-- Bottom left small sparkle -->
    <path d="M160 340 C160 360 145 375 125 375 C145 375 160 390 160 410 C160 390 175 375 195 375 C175 375 160 360 160 340 Z" fill="#3b82f6" opacity="0.8" />
  </g>
</svg>
